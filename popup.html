<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 15px; background: #f9fafb; }
    h2 { color: #0a66c2; font-size: 18px; margin-top: 0; display: flex; align-items: center; gap: 8px; }
    .section { margin-bottom: 15px; }
    label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 5px; }
    select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #d1d5db; }
    .footer { font-size: 10px; color: #9ca3af; text-align: center; margin-top: 20px; }
  </style>
</head>
<body>
  <h2><span>🔍</span> RizqFilter</h2>
  <div class="section">
    <label for="lang-select">Interface Language</label>
    <select id="lang-select">
      <option value="en">English</option>
      <option value="fr">Français</option>
      <option value="ar">العربية</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
      <option value="tr">Türkçe</option>
      <option value="id">Indonesia</option>
      <option value="ur">Urdu</option>
      <option value="bn">Bengali</option>
      <option value="ms">Malay</option>
    </select>
  </div>
  <div class="footer">
    Powered by authentic sources:<br>Quran.com + Sunnah.com + Wikidata
  </div>
  <script src="popup.js"></script>
</body>
</html>
